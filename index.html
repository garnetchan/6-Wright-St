function SiteReportsTab(){
  const[meetings,setMeetings]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[view,setView]=useState("tracker");   // tracker | actions
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState(null);
  const TODAY=todayStr();

  useEffect(()=>{
    (async()=>{
      try{
        const d=await window.storage.get("reno_meetings_v1").catch(()=>null);
        setMeetings(d?JSON.parse(d.value):SEED_MEETINGS);
      }catch(e){ setMeetings(SEED_MEETINGS); }
      setLoaded(true);
    })();
  },[]);

  useEffect(()=>{
    if(!loaded||!meetings) return;
    const t=setTimeout(async()=>{
      try{ await window.storage.set("reno_meetings_v1",JSON.stringify(meetings)); }catch(e){}
    },800);
    return()=>clearTimeout(t);
  },[meetings,loaded]);

  if(!loaded) return <div style={{color:"#64748b",padding:20,textAlign:"center"}}>Loading…</div>;

  const completed   = meetings.filter(m=>m.status.startsWith("Completed"));
  const cancelled   = meetings.filter(m=>m.status==="Cancelled");
  const scheduled   = meetings.filter(m=>m.status==="Scheduled");
  const reportsRcvd = meetings.filter(m=>m.report_status==="Received");
  const reportsOdue = meetings.filter(m=>m.report_status==="Overdue");
  const nextMeeting = meetings.find(m=>m.status==="Scheduled"&&m.scheduled>=TODAY);
  const openActions = meetings.filter(m=>m.actions&&m.actions.trim()!=="");

  const save=(f)=>{
    setMeetings(prev=>prev.map(m=>m.id===f.id?f:m));
    setModal(null);
  };

  // sub-nav
  return(
    <div>
      {/* sub nav */}
      <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:"1px solid #334155"}}>
        {[["tracker","📅 Meeting Tracker"],["actions","✅ Open Actions"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{background:"none",border:"none",borderBottom:`2px solid ${view===v?"#3b82f6":"transparent"}`,padding:"10px 16px",color:view===v?"#f1f5f9":"#64748b",cursor:"pointer",fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:6}}>
            {l}
            {v==="actions"&&openActions.length>0&&<span style={{background:"#f59e0b",borderRadius:10,padding:"1px 6px",fontSize:10,color:"#fff",fontWeight:700}}>{openActions.length}</span>}
          </button>
        ))}
      </div>

      {view==="tracker"&&(
        <div>
          {/* KPI cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:10,marginBottom:20}}>
            {[
              {label:"Meetings Held",      value:String(completed.length),   color:"#22c55e", sub:`of ${meetings.length} total`},
              {label:"Cancelled",          value:String(cancelled.length),   color:"#ef4444", sub:""},
              {label:"Upcoming Scheduled", value:String(scheduled.length),   color:"#3b82f6", sub:nextMeeting?`next: ${fmtDate(nextMeeting.scheduled)}`:""},
              {label:"Progress Reports",   value:String(reportsRcvd.length), color:"#22c55e", sub:"received"},
              {label:"Reports Overdue",    value:String(reportsOdue.length), color:"#ef4444", sub:"not yet received"},
            ].map(k=>(
              <div key={k.label} style={{background:"#1e2535",borderRadius:10,padding:"13px 15px",borderTop:`3px solid ${k.color}`}}>
                <div style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>{k.label}</div>
                <div style={{fontSize:22,fontWeight:800,color:k.color}}>{k.value}</div>
                {k.sub&&<div style={{fontSize:11,color:"#64748b",fontStyle:"italic"}}>{k.sub}</div>}
              </div>
            ))}
          </div>

          {/* Next meeting alert */}
          {nextMeeting&&(
            <div style={{background:"#1e3a5f",border:"1px solid #3b82f644",borderRadius:8,padding:"10px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:20}}>📌</span>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#93c5fd"}}>Next meeting — #{nextMeeting.num}</div>
                <div style={{fontSize:12,color:"#64748b"}}>{fmtDate(nextMeeting.scheduled)}{nextMeeting.milestone?` · ${nextMeeting.milestone}`:""}</div>
              </div>
              {nextMeeting.report_status==="Overdue"&&<div style={{marginLeft:"auto",background:"#ef444422",border:"1px solid #ef444444",borderRadius:6,padding:"4px 10px",fontSize:11,color:"#fca5a5",fontWeight:700}}>⚠ Progress report overdue</div>}
            </div>
          )}

          {/* Full meeting table */}
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:"2px solid #334155"}}>
                {["#","Scheduled","Rescheduled","Actual Date","Status","Construction Milestone","Agenda / Notes","Progress Report","Actions","Minutes"].map(h=>(
                  <th key={h} style={{padding:"7px 9px",textAlign:"left",color:"#64748b",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.4,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{meetings.map((m,i)=>{
                const isPast   = m.scheduled<=TODAY && m.status==="Scheduled";
                const rowBg    = m.status==="Scheduled"?"transparent":(i%2===0?"#1e253511":"transparent");
                return(
                  <tr key={m.id} style={{borderBottom:"1px solid #1e2535",background:rowBg,opacity:m.status==="Cancelled"?0.5:1}}
                    onMouseEnter={e=>e.currentTarget.style.background="#1e2535"}
                    onMouseLeave={e=>e.currentTarget.style.background=rowBg}>
                    <td style={{padding:"8px 9px",color:"#64748b",fontWeight:700,textAlign:"center"}}>{m.num}</td>
                    <td style={{padding:"8px 9px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(m.scheduled)}</td>
                    <td style={{padding:"8px 9px",color:"#f59e0b",whiteSpace:"nowrap"}}>{m.rescheduled?fmtDate(m.rescheduled):"—"}</td>
                    <td style={{padding:"8px 9px",color:"#f1f5f9",fontWeight:600,whiteSpace:"nowrap"}}>{m.actual?fmtDate(m.actual):"—"}</td>
                    <td style={{padding:"8px 9px"}}>
                      <span style={{background:(MTG_STATUS_COLOR[m.status]||"#334155")+"22",color:MTG_STATUS_COLOR[m.status]||"#64748b",border:`1px solid ${(MTG_STATUS_COLOR[m.status]||"#334155")}44`,borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{m.status}</span>
                    </td>
                    <td style={{padding:"8px 9px",color:"#94a3b8",fontSize:11,maxWidth:160}}>{m.milestone||"—"}</td>
                    <td style={{padding:"8px 9px",color:"#64748b",fontSize:11,maxWidth:200,fontStyle:m.agenda||m.notes?"normal":"italic"}}>
                      {m.agenda&&<div style={{color:"#94a3b8",marginBottom:2}}><span style={{color:"#475569",fontWeight:600}}>Agenda: </span>{m.agenda}</div>}
                      {m.notes&&<div>{m.notes}</div>}
                      {!m.agenda&&!m.notes&&"—"}
                    </td>
                    <td style={{padding:"8px 9px",whiteSpace:"nowrap"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{background:(RPT_STATUS_COLOR[m.report_status]||"#334155")+"22",color:RPT_STATUS_COLOR[m.report_status]||"#64748b",border:`1px solid ${(RPT_STATUS_COLOR[m.report_status]||"#334155")}44`,borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>{m.report_status}</span>
                        {m.report_link&&<a href={m.report_link} target="_blank" rel="noreferrer" style={{color:"#3b82f6",fontSize:10,textDecoration:"none"}}>↗ View</a>}
                      </div>
                    </td>
                    <td style={{padding:"8px 9px",color:"#f59e0b",fontSize:11,maxWidth:160}}>
                      {m.actions?m.actions.split("\n").map((a,i)=><div key={i} style={{marginBottom:2}}>• {a}</div>):"—"}
                    </td>
                    <td style={{padding:"8px 9px"}}>
                      <div style={{display:"flex",gap:5,alignItems:"center"}}>
                        {m.minutes_link&&<a href={m.minutes_link} target="_blank" rel="noreferrer" style={{color:"#22c55e",fontSize:10,textDecoration:"none"}}>↗ View</a>}
                        <button onClick={()=>{setForm({...m});setModal("edit");}} style={{background:"#334155",border:"none",borderRadius:5,padding:"3px 8px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>Edit</button>
                      </div>
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}

      {view==="actions"&&(
        <div>
          {openActions.length===0
            ? <div style={{color:"#475569",textAlign:"center",padding:40,fontSize:14}}>No open actions 🎉</div>
            : (
              <div style={{display:"grid",gap:10}}>
                {openActions.map(m=>(
                  <div key={m.id} style={{background:"#1e2535",borderRadius:10,padding:"14px 18px",borderLeft:"3px solid #f59e0b"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div style={{display:"flex",gap:10,alignItems:"center"}}>
                        <span style={{color:"#64748b",fontWeight:700,fontSize:13}}>Meeting #{m.num}</span>
                        <span style={{color:"#94a3b8",fontSize:11}}>{fmtDate(m.actual||m.scheduled)}</span>
                        {m.milestone&&<span style={{color:"#475569",fontSize:11}}>· {m.milestone}</span>}
                      </div>
                      <button onClick={()=>{setForm({...m});setModal("edit");}} style={{background:"#334155",border:"none",borderRadius:5,padding:"3px 8px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>Edit</button>
                    </div>
                    {m.actions.split("\n").filter(a=>a.trim()).map((action,i)=>(
                      <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"4px 0",borderTop:i>0?"1px solid #334155":"none"}}>
                        <span style={{color:"#f59e0b",marginTop:1,flexShrink:0}}>→</span>
                        <span style={{color:"#fde68a",fontSize:13}}>{action}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            )
          }
        </div>
      )}

      {/* Edit modal */}
      {modal&&form&&(
        <Modal title={`Edit Meeting #${form.num}`} onClose={()=>setModal(null)} wide>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:4}}>
            <Field label="Scheduled Date"><input type="date" value={form.scheduled} onChange={e=>setForm(f=>({...f,scheduled:e.target.value}))} style={inp}/></Field>
            <Field label="Rescheduled To"><input type="date" value={form.rescheduled} onChange={e=>setForm(f=>({...f,rescheduled:e.target.value}))} style={inp}/></Field>
            <Field label="Actual Date"><input type="date" value={form.actual} onChange={e=>setForm(f=>({...f,actual:e.target.value}))} style={inp}/></Field>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:4}}>
            <Field label="Meeting Status">
              <Sel value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={["Scheduled","Completed","Completed (rescheduled)","Cancelled"]}/>
            </Field>
            <Field label="Progress Report Status">
              <Sel value={form.report_status} onChange={v=>setForm(f=>({...f,report_status:v}))} options={["Not due","Received","Overdue","N/A"]}/>
            </Field>
            <Field label="Construction Milestone"><input value={form.milestone} onChange={e=>setForm(f=>({...f,milestone:e.target.value}))} style={inp} placeholder="e.g. Rough in of Services"/></Field>
            <Field label="Contract Milestone"><input value={form.contract_milestone} onChange={e=>setForm(f=>({...f,contract_milestone:e.target.value}))} style={inp}/></Field>
          </div>
          <Field label="Agenda / Decision Items"><input value={form.agenda} onChange={e=>setForm(f=>({...f,agenda:e.target.value}))} style={inp} placeholder="Pre-meeting agenda items"/></Field>
          <Field label="Notes from meeting"><input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={inp} placeholder="What happened, observations, decisions made"/></Field>
          <Field label="Actions to close">
            <textarea value={form.actions} onChange={e=>setForm(f=>({...f,actions:e.target.value}))} style={{...inp,height:70,resize:"vertical"}} placeholder="One action per line, e.g. GC: Send updated schedule"/>
          </Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Progress Report Link"><input value={form.report_link} onChange={e=>setForm(f=>({...f,report_link:e.target.value}))} style={inp} placeholder="https://drive.google.com/…"/></Field>
            <Field label="Meeting Minutes Link"><input value={form.minutes_link} onChange={e=>setForm(f=>({...f,minutes_link:e.target.value}))} style={inp} placeholder="https://drive.google.com/…"/></Field>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
            <button onClick={()=>setModal(null)} style={{background:"#334155",border:"none",borderRadius:8,padding:"9px 20px",color:"#94a3b8",cursor:"pointer",fontWeight:600}}>Cancel</button>
            <button onClick={()=>save(form)} style={{background:"#3b82f6",border:"none",borderRadius:8,padding:"9px 20px",color:"#fff",cursor:"pointer",fontWeight:700}}>Save</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// DECISIONS TAB — PS/PC procurement & install tracker
// ══════════════════════════════════════════════════════════════════════════════

const SUPPLIER_STATUS_OPTS   = ["All","Decided","Quote requested","Quotes received","Not started"];
const PROCUREMENT_STATUS_OPTS= ["All","Order placed","In production","Delivered","Under tender","Not started","Unknown"];
const INSTALL_STATUS_OPTS    = ["All","Complete","In progress","Complete but with defects","Not started","Unknown"];

const SUPPLIER_STATUS_COLOR = {
  "Decided":         "#22c55e",
  "Quotes received": "#f59e0b",
  "Quote requested": "#3b82f6",
  "Not started":     "#ef4444",
};
const PROCUREMENT_COLOR = {
  "Delivered":     "#22c55e",
  "Order placed":  "#86efac",
  "In production": "#a78bfa",
  "Under tender":  "#f59e0b",
  "Not started":   "#475569",
  "Unknown":       "#334155",
};
const INSTALL_COLOR = {
  "Complete":                  "#22c55e",
  "In progress":               "#3b82f6",
  "Complete but with defects": "#f59e0b",
  "Not started":               "#475569",
  "Unknown":                   "#334155",
};

function StatusChip({label, colorMap, small}){
  const color = colorMap[label] || "#64748b";
  return(
    <span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:4,
      padding:small?"1px 6px":"2px 8px",fontSize:small?9:10,fontWeight:700,whiteSpace:"nowrap"}}>
      {label}
    </span>
  );
}

function FilterPills({label, options, colorMap, value, onChange}){
  return(
    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
      <span style={{fontSize:10,color:"#475569",fontWeight:700,textTransform:"uppercase",
        letterSpacing:.5,whiteSpace:"nowrap",minWidth:90}}>{label}</span>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {options.map(opt=>{
          const active = value===opt;
          const color = opt==="All" ? "#64748b" : (colorMap?.[opt]||"#64748b");
          return(
            <button key={opt} onClick={()=>onChange(opt)}
              style={{padding:"4px 10px",borderRadius:16,border:`1px solid ${active?color+"66":"transparent"}`,
                cursor:"pointer",fontSize:11,fontWeight:600,
                background:active?color+"33":"#1e2535",color:active?color:"#64748b"}}>
              {opt}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function DecisionsTab(){
  const[decisions,setDecisions]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[supplierF,setSupplierF]=useState("All");
  const[procF,setProcF]=useState("All");
  const[installF,setInstallF]=useState("All");
  const[actionsOnly,setActionsOnly]=useState(false);
  const[cpOnly,setCpOnly]=useState(false);
  const[expanded,setExpanded]=useState(null);

  useEffect(()=>{
    (async()=>{
      try{
        const d=await window.storage.get("reno_decisions_register_v2").catch(()=>null);
        setDecisions(d?JSON.parse(d.value):SEED_DECISIONS_REGISTER);
      }catch(e){ setDecisions(SEED_DECISIONS_REGISTER); }
      setLoaded(true);
    })();
  },[]);

  useEffect(()=>{
    if(!loaded||!decisions) return;
    const t=setTimeout(async()=>{
      try{ await window.storage.set("reno_decisions_register_v2",JSON.stringify(decisions)); }catch(e){}
    },800);
    return()=>clearTimeout(t);
  },[decisions,loaded]);

  if(!loaded) return <div style={{color:"#64748b",padding:20,textAlign:"center"}}>Loading…</div>;

  // ── filter ──────────────────────────────────────────────────────────────────
  const visible = decisions.filter(d=>{
    if(supplierF!=="All"  && d.supplier_status!==supplierF)    return false;
    if(procF!=="All"      && d.procurement_status!==procF)     return false;
    if(installF!=="All"   && d.install_status!==installF)      return false;
    if(actionsOnly        && !d.next_action)                   return false;
    if(cpOnly             && d.critical_path!=="Yes")          return false;
    return true;
  });

  // ── KPIs ────────────────────────────────────────────────────────────────────
  const decided      = decisions.filter(d=>d.supplier_status==="Decided").length;
  const withActions  = decisions.filter(d=>d.next_action).length;
  const defects      = decisions.filter(d=>d.install_status==="Complete but with defects").length;
  const cpPending    = decisions.filter(d=>d.critical_path==="Yes"&&d.supplier_status!=="Decided").length;
  const inProd       = decisions.filter(d=>["Order placed","In production","Under tender"].includes(d.procurement_status)).length;
  const complete     = decisions.filter(d=>["Complete","Complete but with defects"].includes(d.install_status)).length;

  return(
    <div>
      {/* KPI row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:16}}>
        {[
          {l:"Supplier Decided",    v:String(decided),     c:"#22c55e", sub:`of ${decisions.length} items`},
          {l:"Open Actions",        v:String(withActions), c:"#f59e0b", sub:"requiring follow-up"},
          {l:"Defects Outstanding", v:String(defects),     c:"#ef4444", sub:"install with defects",ac:defects>0?"#450a0a":undefined},
          {l:"Critical Pending",    v:String(cpPending),   c:"#ef4444", sub:"on critical path",ac:cpPending>0?"#450a0a":undefined},
          {l:"In Procurement",      v:String(inProd),      c:"#a78bfa", sub:"ordered/in production/tender"},
          {l:"Install Complete",    v:String(complete),    c:"#22c55e", sub:`of ${decisions.length} items`},
        ].map(k=>(
          <div key={k.l} style={{background:k.ac||"#1e2535",borderRadius:10,padding:"12px 14px",borderTop:`3px solid ${k.c}`}}>
            <div style={{fontSize:9,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:20,fontWeight:800,color:k.c}}>{k.v}</div>
            <div style={{fontSize:10,color:"#64748b",fontStyle:"italic"}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Defects / critical alerts */}
      {defects>0&&(
        <div style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:8,padding:"10px 16px",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#ef4444",marginBottom:6}}>⚠ Items with install defects</div>
          {decisions.filter(d=>d.install_status==="Complete but with defects").map(d=>(
            <div key={d.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #ef444420",fontSize:12}}>
              <span style={{color:"#fca5a5",fontWeight:600}}>{d.category}</span>
              <span style={{color:"#64748b",fontSize:11,fontStyle:"italic"}}>{d.next_action||"No action recorded"}</span>
            </div>
          ))}
        </div>
      )}
      {cpPending>0&&(
        <div style={{background:"#f59e0b11",border:"1px solid #f59e0b33",borderRadius:8,padding:"10px 16px",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#f59e0b",marginBottom:6}}>🚨 Critical path — supplier not yet decided</div>
          {decisions.filter(d=>d.critical_path==="Yes"&&d.supplier_status!=="Decided").map(d=>(
            <div key={d.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #f59e0b20",fontSize:12}}>
              <span style={{color:"#fde68a",fontWeight:600}}>{d.category}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <StatusChip label={d.supplier_status} colorMap={SUPPLIER_STATUS_COLOR} small/>
                {d.next_action&&<span style={{color:"#64748b",fontSize:11,fontStyle:"italic"}}>{d.next_action}</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Filter controls */}
      <div style={{background:"#1e2535",borderRadius:10,padding:"14px 16px",marginBottom:14,display:"grid",gap:10}}>
        <FilterPills label="Supplier"    options={SUPPLIER_STATUS_OPTS}    colorMap={SUPPLIER_STATUS_COLOR} value={supplierF} onChange={setSupplierF}/>
        <FilterPills label="Procurement" options={PROCUREMENT_STATUS_OPTS} colorMap={PROCUREMENT_COLOR}     value={procF}     onChange={setProcF}/>
        <FilterPills label="Install"     options={INSTALL_STATUS_OPTS}     colorMap={INSTALL_COLOR}         value={installF}  onChange={setInstallF}/>
        <div style={{display:"flex",gap:10,paddingTop:4,borderTop:"1px solid #334155"}}>
          <button onClick={()=>setActionsOnly(v=>!v)}
            style={{padding:"5px 12px",borderRadius:16,border:`1px solid ${actionsOnly?"#f59e0b66":"transparent"}`,
              cursor:"pointer",fontSize:11,fontWeight:600,
              background:actionsOnly?"#f59e0b33":"#334155",color:actionsOnly?"#f59e0b":"#64748b"}}>
            {actionsOnly?"✓ ":""}Outstanding actions only
          </button>
          <button onClick={()=>setCpOnly(v=>!v)}
            style={{padding:"5px 12px",borderRadius:16,border:`1px solid ${cpOnly?"#ef444466":"transparent"}`,
              cursor:"pointer",fontSize:11,fontWeight:600,
              background:cpOnly?"#ef444422":"#334155",color:cpOnly?"#fca5a5":"#64748b"}}>
            {cpOnly?"✓ ":""}Critical path only
          </button>
          <span style={{marginLeft:"auto",fontSize:11,color:"#475569",alignSelf:"center"}}>
            {visible.length} of {decisions.length} items
          </span>
        </div>
      </div>

      {/* Decision cards */}
      <div style={{display:"grid",gap:8}}>
        {visible.map(d=>{
          const supColor  = SUPPLIER_STATUS_COLOR[d.supplier_status]||"#64748b";
          const variance  = d.selected_amount_ex!=null&&d.allowance_ex!=null ? d.selected_amount_ex-d.allowance_ex : null;
          const isExp     = expanded===d.id;
          return(
            <div key={d.id} style={{background:"#1e2535",borderRadius:10,overflow:"hidden",borderLeft:`3px solid ${supColor}`}}>
              {/* Card header */}
              <div style={{padding:"12px 16px",cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start"}}
                onClick={()=>setExpanded(isExp?null:d.id)}>
                <div style={{flex:1,minWidth:0}}>
                  {/* Row 1: category + critical + status chips */}
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{d.category}</span>
                    {d.critical_path==="Yes"&&<span style={{background:"#ef444422",color:"#ef4444",border:"1px solid #ef444444",borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700}}>CP</span>}
                  </div>
                  {/* Row 2: three status chips + amount */}
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <StatusChip label={d.supplier_status}    colorMap={SUPPLIER_STATUS_COLOR} small/>
                    <StatusChip label={d.procurement_status} colorMap={PROCUREMENT_COLOR}     small/>
                    <StatusChip label={d.install_status}     colorMap={INSTALL_COLOR}         small/>
                    {d.selected_amount_ex!=null&&(
                      <span style={{color:"#94a3b8",fontSize:11,marginLeft:4}}>
                        {fmtAUD(d.selected_amount_ex)} ex
                        {variance!=null&&<span style={{color:variance>0?"#ef4444":"#22c55e",fontWeight:700,marginLeft:4}}>({variance>0?"+":""}{fmtAUD(variance)})</span>}
                      </span>
                    )}
                    {d.selected_supplier&&<span style={{color:"#475569",fontSize:11}}>· {d.selected_supplier}</span>}
                  </div>
                  {/* Row 3: next action if present */}
                  {d.next_action&&(
                    <div style={{marginTop:6,fontSize:11,color:"#fde68a",display:"flex",gap:4,alignItems:"flex-start"}}>
                      <span style={{color:"#f59e0b",flexShrink:0}}>→</span>
                      <span>{d.next_action}</span>
                    </div>
                  )}
                </div>
                <span style={{color:"#475569",fontSize:14,flexShrink:0,marginTop:2}}>{isExp?"▲":"▼"}</span>
              </div>

              {/* Expanded detail */}
              {isExp&&(
                <div style={{borderTop:"1px solid #334155",padding:"14px 16px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:8,marginBottom:12}}>
                    {[
                      ["Allowance (ex GST)", d.allowance_ex!=null?fmtAUD(d.allowance_ex):"—", "#7c3aed"],
                      ["Selected Amount (ex)", d.selected_amount_ex!=null?fmtAUD(d.selected_amount_ex):"—", "#f1f5f9"],
                      ["Variance", variance!=null?(variance===0?"—":(variance>0?"+":"")+fmtAUD(variance)):"—", variance!=null&&variance>0?"#ef4444":variance!=null&&variance<0?"#22c55e":"#64748b"],
                      ["Decision Date", d.decision_date||"—", "#94a3b8"],
                    ].map(([label,val,color])=>(
                      <div key={label} style={{background:"#0f172a",borderRadius:6,padding:"8px 10px"}}>
                        <div style={{fontSize:9,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>{label}</div>
                        <div style={{fontSize:13,fontWeight:600,color}}>{val}</div>
                      </div>
                    ))}
                  </div>
                  {d.decision_notes&&(
                    <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,marginBottom:10}}>{d.decision_notes}</div>
                  )}
                  {d.quotes.length>0&&(
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Quotes</div>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                        <thead><tr style={{borderBottom:"1px solid #334155"}}>
                          {["Supplier","Amount (ex)","Date","Ref","Notes"].map(h=>(
                            <th key={h} style={{padding:"5px 8px",textAlign:"left",color:"#475569",fontSize:9,fontWeight:700,textTransform:"uppercase"}}>{h}</th>
                          ))}
                        </tr></thead>
                        <tbody>{d.quotes.map((q,i)=>{
                          const isSel = q.supplier===d.selected_supplier||(d.quotes.length===1&&d.supplier_status==="Decided");
                          return(
                            <tr key={i} style={{borderBottom:"1px solid #1e2535",background:isSel?"#14532d22":"transparent"}}>
                              <td style={{padding:"6px 8px",color:isSel?"#86efac":"#f1f5f9",fontWeight:isSel?700:400}}>
                                {q.supplier}{isSel&&<span style={{marginLeft:5,color:"#22c55e",fontSize:9,fontWeight:700}}>✓ SELECTED</span>}
                              </td>
                              <td style={{padding:"6px 8px",color:"#f1f5f9",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{q.amount_ex?fmtAUD(q.amount_ex):"—"}</td>
                              <td style={{padding:"6px 8px",color:"#64748b",whiteSpace:"nowrap"}}>{q.date||"—"}</td>
                              <td style={{padding:"6px 8px",color:"#7c3aed",fontFamily:"monospace",fontSize:10}}>{q.ref||"—"}</td>
                              <td style={{padding:"6px 8px",color:"#64748b",fontStyle:"italic"}}>{q.notes||"—"}</td>
                            </tr>
                          );
                        })}</tbody>
                      </table>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
        {visible.length===0&&(
          <div style={{color:"#475569",textAlign:"center",padding:40,fontSize:14}}>
            No items match the current filters.
          </div>
        )}
      </div>
    </div>
  );
}



function App(){
  const[tab,setTab]=useState("program");
  const[milestones,setMilestones]=useState(null);
  const[meetings,setMeetings]=useState(null);
  const[tasks,setTasks]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[saving,setSaving]=useState(false);
  const[resetConfirm,setResetConfirm]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const[ms,t,mt]=await Promise.all([
          window.storage.get("reno_milestones_v2").catch(()=>null),
          window.storage.get("reno_tasks_v2").catch(()=>null),
          window.storage.get("reno_meetings_v1").catch(()=>null),
        ]);
        setMilestones(ms?JSON.parse(ms.value):SEED_MILESTONES);
        setTasks(t?JSON.parse(t.value):SEED_TASKS);
        setMeetings(mt?JSON.parse(mt.value):SEED_MEETINGS);
      }catch(e){
        setMilestones(SEED_MILESTONES);setTasks(SEED_TASKS);setMeetings(SEED_MEETINGS);
      }
      setLoaded(true);
    })();
  },[]);

  useEffect(()=>{
    if(!loaded||milestones===null) return;
    setSaving(true);
    const t=setTimeout(async()=>{
      try{await Promise.all([
        window.storage.set("reno_milestones_v2",JSON.stringify(milestones)),
        window.storage.set("reno_tasks_v2",JSON.stringify(tasks)),
      ]);}catch(e){}
      setSaving(false);
    },800);
    return()=>clearTimeout(t);
  },[milestones,tasks,loaded]);

  if(!loaded) return <div style={{background:"#0f172a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b",fontFamily:"system-ui"}}>Loading…</div>;

  const doReset=async()=>{
    const fresh_ms=SEED_MILESTONES.map(m=>({...m,id:uid()}));
    const fresh_t=SEED_TASKS.map(t=>({...t,id:uid()}));
    setMilestones(fresh_ms); setTasks(fresh_t);
    try{
      await window.storage.set("reno_milestones_v2",JSON.stringify(fresh_ms));
      await window.storage.set("reno_tasks_v2",JSON.stringify(fresh_t));
    }catch(e){}
    setResetConfirm(false);
  };

  const critActive=tasks?.filter(t=>t.critical==="Yes"&&t.status!=="Complete"&&t.forecast_end&&todayStr()>t.forecast_end).length||0;

  const reportsOverdue=meetings?.filter(m=>m.report_status==="Overdue"&&m.status!=="Cancelled").length||0;
  const tabDefs=[
    {id:"program",   label:"📅 Program",   count:critActive,      countColor:"#ef4444"},
    {id:"costs",     label:"💰 Costs",     count:0,               countColor:""},
    {id:"receipts",  label:"🧾 Receipts",  count:null},
    {id:"site",      label:"🏗️ Site & Reports", count:reportsOverdue, countColor:"#ef4444"},
    {id:"decisions", label:"✅ Decisions", count:0, countColor:"#ef4444"},
  ];

  return(
    <div style={{background:"#0f172a",minHeight:"100vh",color:"#f1f5f9",fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
      <div style={{background:"#0a0f1e",borderBottom:"1px solid #1e2535",padding:"15px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:19,fontWeight:800,letterSpacing:-0.5}}>🏗️ 6 Wright St, Croydon — Command Centre</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>
            {milestones?.filter(m=>m.status==="Complete").length||0} milestones complete · {tasks?.filter(t=>t.status==="In Progress").length||0} tasks active
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {resetConfirm?(
            <div style={{display:"flex",alignItems:"center",gap:6,background:"#450a0a",border:"1px solid #ef444444",borderRadius:6,padding:"4px 10px"}}>
              <span style={{fontSize:11,color:"#fca5a5"}}>Reset program data?</span>
              <button onClick={doReset} style={{background:"#ef4444",border:"none",borderRadius:4,padding:"3px 10px",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:700}}>Yes, reset</button>
              <button onClick={()=>setResetConfirm(false)} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:13,lineHeight:1}}>×</button>
            </div>
          ):(
            <button onClick={()=>setResetConfirm(true)} style={{background:"none",border:"1px solid #334155",borderRadius:6,padding:"5px 12px",color:"#475569",cursor:"pointer",fontSize:11,fontWeight:600}}>↺ Reset program data</button>
          )}
          <div style={{fontSize:11,color:saving?"#f59e0b":"#22c55e",display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:"currentColor",display:"inline-block"}}/>
            {saving?"Saving…":"All saved"}
          </div>
        </div>
      </div>
      <div style={{background:"#0a0f1e",borderBottom:"1px solid #1e2535",padding:"0 24px",display:"flex",gap:0}}>
        {tabDefs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?"#3b82f6":"transparent"}`,padding:"11px 16px",color:tab===t.id?"#f1f5f9":"#64748b",cursor:"pointer",fontWeight:600,fontSize:14,display:"flex",alignItems:"center",gap:6}}>
            {t.label}
            {t.count>0&&<span style={{background:t.countColor,borderRadius:10,padding:"1px 6px",fontSize:10,color:"#fff",fontWeight:700}}>{t.count}</span>}
          </button>
        ))}
      </div>
      <div style={{padding:24}}>
        {tab==="program"   &&<ProgramTab milestones={milestones} setMilestones={setMilestones} tasks={tasks} setTasks={setTasks}/>}
        {tab==="costs"     &&<CostsTab/>}
        {tab==="receipts"  &&<ReceiptsTab/>}
        {tab==="site"      &&<SiteReportsTab/>}
        {tab==="decisions" &&<DecisionsTab/>}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
