      set: (key, value) => { try { localStorage.setItem(key, value); return Promise.resolve({ key, value }); } catch(e) { return Promise.reject(e); } },

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2) return {headers:[],rows:[]};
  const pl=line=>{const cols=[];let cur="",inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){inQ=!inQ;continue;}if((ch===','||ch==='\t')&&!inQ){cols.push(cur.trim());cur="";continue;}cur+=ch;}cols.push(cur.trim());return cols;};
  const headers=pl(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,""));
  return{headers,rows:lines.slice(1).filter(l=>l.trim()).map(pl)};
}

function fuzzyMatch(uploaded,targets){
  const syn={task:["task_name","activity","name"],milestone:["milestone_name","name"],milestone_phase:["phase","milestone"],cost_category:["category","cost_cat","trade"],critical:["is_critical","crit"],forecast_start:["f_start","forecast_start_date","planned_start","start"],forecast_end:["f_end","forecast_end_date","planned_end","end","finish"],actual_start:["a_start","actual_start_date"],actual_end:["a_end","actual_end_date"],complete:["completion","pct","percent","progress"],status:["state"],predecessor:["pred","depends_on"],delay_reason:["delay","reason","cause"],note:["notes","comment"],phase:["program_phase"],description:["desc","item","name"],type:["cost_type"],budgeted:["budget","planned","original"],actual:["actual_cost","committed","spend"],amount:["value","payment","cost","total"],supplier:["vendor","contractor","payee"],reference:["ref","invoice","inv"],date:["payment_date","invoice_date"],decision:["choice","selection"],cost_impact:["impact","variation","delta"]};
  const map={};
  for(const t of targets){const syns=[t,...(syn[t]||[])];map[t]=uploaded.find(h=>syns.includes(h)||syns.some(s=>h.includes(s)||s.includes(h)))||null;}
  return map;
}

function gv(row,headers,colMap,key){const col=colMap[key];if(!col)return"";const idx=headers.indexOf(col);return idx>=0?(row[idx]||"").trim():"";}
function me(val,list){return list.find(x=>x.toLowerCase()===val.toLowerCase())||list[0];}

function ImportModal({tab,onClose,onImport}){
  const[stage,setStage]=useState("upload");
  const[parsed,setParsed]=useState(null);
  const[colMap,setColMap]=useState({});
  const[preview,setPreview]=useState([]);
  const[mode,setMode]=useState("replace");
  const[error,setError]=useState("");
  const[dragOver,setDragOver]=useState(false);
  const fileRef=useRef();
  const th=TEMPLATES[tab].headers;
  const process=file=>{if(!file)return;const r=new FileReader();r.onload=ev=>{try{const{headers,rows}=parseCSV(ev.target.result);if(!headers.length){setError("No headers found.");return;}setParsed({headers,rows});setColMap(fuzzyMatch(headers,th));setError("");setStage("map");}catch(e){setError("Failed: "+e.message);}};r.readAsText(file);};
  const steps=["upload","map","preview"];
  return(
    <Modal title={`Import ${tab}`} onClose={onClose} wide>
      <div style={{display:"flex",alignItems:"center",marginBottom:20}}>
        {steps.map((s,i)=>(
          <div key={s} style={{display:"flex",alignItems:"center",flex:i<steps.length-1?1:"auto"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:stage===s?"#3b82f6":steps.indexOf(stage)>i?"#22c55e":"#334155",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{steps.indexOf(stage)>i?"✓":i+1}</div>
              <div style={{fontSize:10,color:"#64748b",marginTop:3,textTransform:"capitalize"}}>{s}</div>
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:1,background:"#334155",margin:"0 6px",marginBottom:14}}/>}
          </div>
        ))}
      </div>
      {error&&<div style={{background:"#ef444422",border:"1px solid #ef444444",borderRadius:6,padding:"8px 12px",fontSize:13,color:"#fca5a5",marginBottom:12}}>{error}</div>}
      {stage==="upload"&&(
        <div>
          <div onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);process(e.dataTransfer.files[0]);}} onClick={()=>fileRef.current.click()} style={{background:dragOver?"#1e3a5f":"#0f172a",border:`2px dashed ${dragOver?"#3b82f6":"#334155"}`,borderRadius:10,padding:"32px 24px",textAlign:"center",cursor:"pointer",marginBottom:16}}>
            <div style={{fontSize:32,marginBottom:8}}>📂</div>
            <div style={{color:"#94a3b8",fontSize:14}}>Drag & drop your CSV, or click to browse</div>
            <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" onChange={e=>process(e.target.files[0])} style={{display:"none"}}/>
          </div>
          <div style={{background:"#0f172a",borderRadius:8,padding:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Expected columns</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{th.map(h=><Badge key={h} label={h} color="#3b82f6"/>)}</div>
          </div>
        </div>
      )}
      {stage==="map"&&parsed&&(
        <div>
          <div style={{fontSize:13,color:"#94a3b8",marginBottom:14}}>Found <strong style={{color:"#f1f5f9"}}>{parsed.headers.length} columns</strong>, <strong style={{color:"#f1f5f9"}}>{parsed.rows.length} rows</strong>. Adjust mappings if needed.</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10,marginBottom:16}}>
            {th.map(field=>(
              <div key={field} style={{background:"#0f172a",borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:700,color:colMap[field]?"#22c55e":"#f59e0b",textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>{field} {colMap[field]?"✓":"⚠"}</div>
                <select value={colMap[field]||""} onChange={e=>setColMap(m=>({...m,[field]:e.target.value||null}))} style={{...inp,fontSize:12}}>
                  <option value="">— skip —</option>
                  {parsed.headers.map(h=><option key={h} value={h}>{h}</option>)}
                </select>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setStage("upload")} style={{background:"#334155",border:"none",borderRadius:8,padding:"9px 20px",color:"#94a3b8",cursor:"pointer",fontWeight:600}}>Back</button>
            <button onClick={()=>{setPreview(parsed.rows.slice(0,5).map(r=>ROW_PARSERS[tab](r,colMap,parsed.headers)));setStage("preview");}} style={{background:"#3b82f6",border:"none",borderRadius:8,padding:"9px 20px",color:"#fff",cursor:"pointer",fontWeight:700}}>Preview →</button>
          </div>
        </div>
      )}
      {stage==="preview"&&(
        <div>
          <div style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>First {preview.length} of {parsed.rows.length} rows:</div>
          <div style={{overflowX:"auto",marginBottom:16,borderRadius:8,border:"1px solid #334155"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr style={{background:"#0f172a"}}>{th.map(h=><th key={h} style={{padding:"6px 8px",textAlign:"left",color:"#64748b",fontWeight:700,textTransform:"uppercase",fontSize:10,borderBottom:"1px solid #334155",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
              <tbody>{preview.map((row,i)=><tr key={i} style={{borderBottom:"1px solid #1e2535"}}>{th.map(h=><td key={h} style={{padding:"6px 8px",color:"#f1f5f9",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{String(row[h]??"")}</td>)}</tr>)}</tbody>
            </table>
          </div>
          <Field label="Import mode">
            <div style={{display:"flex",gap:10}}>
              {[["replace","Replace all","Wipes and reloads"],["append","Append","Adds to existing"]].map(([v,t,d])=>(
                <label key={v} style={{display:"flex",gap:8,cursor:"pointer",background:"#0f172a",border:`2px solid ${mode===v?"#3b82f6":"#334155"}`,borderRadius:8,padding:"10px 14px",flex:1}}>
                  <input type="radio" checked={mode===v} onChange={()=>setMode(v)} style={{accentColor:"#3b82f6",marginTop:2,flexShrink:0}}/>
                  <div><div style={{fontSize:13,fontWeight:700,color:mode===v?"#f1f5f9":"#94a3b8"}}>{t}</div><div style={{fontSize:11,color:"#64748b"}}>{d}</div></div>
                </label>
              ))}
            </div>
          </Field>
          {mode==="replace"&&<div style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:6,padding:"8px 12px",fontSize:12,color:"#fca5a5",marginBottom:12}}>⚠ This will delete all existing {tab} data.</div>}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setStage("map")} style={{background:"#334155",border:"none",borderRadius:8,padding:"9px 20px",color:"#94a3b8",cursor:"pointer",fontWeight:600}}>Back</button>
            <button onClick={()=>{onImport(parsed.rows.map(r=>ROW_PARSERS[tab](r,colMap,parsed.headers)),mode);onClose();}} style={{background:"#22c55e",border:"none",borderRadius:8,padding:"9px 24px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>✓ Import {parsed.rows.length} rows</button>
          </div>
        </div>
      )}
    </Modal>
  );
}

function TabToolbar({tab,onImport}){
  const[showImport,setShowImport]=useState(false);
  const[showTemplate,setShowTemplate]=useState(false);
  return(
    <>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setShowTemplate(true)} style={{background:"none",border:"1px solid #334155",borderRadius:7,padding:"7px 12px",color:"#64748b",cursor:"pointer",fontWeight:600,fontSize:12,whiteSpace:"nowrap"}}>📋 Template</button>
        <button onClick={()=>setShowImport(true)} style={{background:"#14532d",border:"1px solid #22c55e44",borderRadius:7,padding:"7px 12px",color:"#22c55e",cursor:"pointer",fontWeight:700,fontSize:12,whiteSpace:"nowrap"}}>⬆ Import CSV</button>
      </div>
      {showTemplate&&<TemplateModal tab={tab} onClose={()=>setShowTemplate(false)}/>}
      {showImport&&<ImportModal tab={tab} onClose={()=>setShowImport(false)} onImport={(items,mode)=>{onImport(items,mode);setShowImport(false);}}/>}
    </>
  );
}

function ProgramDashboard({milestones,tasks}){
  const TODAY=todayStr();
  const handover=milestones.find(m=>m.milestone.toLowerCase().includes("handover"));
  const origEnd=handover?.forecast_end||"2026-09-11";
  const completedVars=milestones.filter(m=>m.status==="Complete"&&m.actual_end&&m.forecast_end).map(m=>daysBetween(m.forecast_end,m.actual_end)||0);
  const maxDelay=completedVars.length?Math.max(...completedVars):0;
  const forecastCompletion=addDays(origEnd,Math.max(maxDelay,0));
  const daysToHandover=forecastCompletion?daysBetween(TODAY,forecastCompletion):null;
  const slipDays=Math.max(maxDelay,0);
  // Critical at risk = critical + not complete + past forecast end date
  const critAtRisk=tasks.filter(t=>
    t.critical==="Yes" &&
    t.status!=="Complete" &&
    t.forecast_end &&
    TODAY>t.forecast_end
  ).length;
  const activeTasks=tasks.filter(t=>t.status==="In Progress");
  // Overdue critical = critical, not complete, past forecast end, but not yet started
  const overdueCritical=tasks.filter(t=>
    t.critical==="Yes" &&
    t.status!=="Complete" &&
    t.status!=="In Progress" &&
    t.forecast_end &&
    TODAY>t.forecast_end
  );
  const delayedItems=[...milestones.filter(m=>m.delay_reason&&m.delay_reason!==""),...tasks.filter(t=>t.delay_reason&&t.delay_reason!=="")];
  const d60=addDays(TODAY,60);
  const upcoming=tasks.filter(t=>t.forecast_start&&t.forecast_start>=TODAY&&t.forecast_start<=d60).sort((a,b)=>a.forecast_start.localeCompare(b.forecast_start));
  const card={background:"#1e2535",borderRadius:10,padding:"14px 16px"};

  return(
    <div>
      {/* KPI cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:24}}>
        {[
          {label:"Forecast Completion",value:fmtDate(forecastCompletion),sub:`+${slipDays}d vs original`,color:"#a78bfa",bg:"#3b0764"},
          {label:"Days to Handover",value:daysToHandover!==null?`${daysToHandover}d`:"—",sub:fmtDate(forecastCompletion),color:"#f59e0b",bg:"#78350f"},
          {label:"Critical Tasks At Risk",value:String(critAtRisk),sub:critAtRisk>0?"action required":"all on track",color:critAtRisk>0?"#ef4444":"#22c55e",bg:critAtRisk>0?"#450a0a":"#14532d"},
          {label:"Tasks In Progress",value:String(activeTasks.length),sub:"active right now",color:"#3b82f6",bg:"#1e3a5f"},
        ].map(k=>(
          <div key={k.label} style={{...card,borderTop:`3px solid ${k.color}`,background:k.bg}}>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>{k.label}</div>
            <div style={{fontSize:22,fontWeight:800,color:k.color,marginBottom:2}}>{k.value}</div>
            <div style={{fontSize:11,color:"#64748b",fontStyle:"italic"}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {slipDays>0&&<div style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:8,padding:"10px 14px",marginBottom:20,fontSize:13,color:"#fca5a5"}}>⚠️ Programme is <strong>+{slipDays} days</strong> behind original forecast. Forecast handover revised to <strong>{fmtDate(forecastCompletion)}</strong>.</div>}

      {/* Overdue critical tasks alert */}
      {overdueCritical.length>0&&(
        <div style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:8,padding:"10px 14px",marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"#ef4444",marginBottom:8}}>🚨 CRITICAL PATH OVERDUE — not yet started</div>
          {overdueCritical.map(t=>{
            const overdue=daysBetween(t.forecast_end,TODAY);
            return(
              <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #ef444420"}}>
                <div>
                  <span style={{color:"#fca5a5",fontSize:13,fontWeight:600}}>{t.task}</span>
                  <span style={{color:"#64748b",fontSize:11,marginLeft:8}}>{t.milestone_phase}</span>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{color:"#ef4444",fontSize:11,fontWeight:700}}>+{overdue}d overdue</span>
                  <span style={{color:"#64748b",fontSize:11}}>was due {fmtDate(t.forecast_end)}</span>
                  {t.predecessor&&<span style={{color:"#475569",fontSize:10}}>← {t.predecessor}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Active tasks — in progress */}
      {activeTasks.length>0&&(
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Active Tasks — In Progress</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:"2px solid #334155"}}>
                {["Task","Milestone Phase","Fcst End","% Complete","Critical","Status","Delay Reason"].map(h=>(
                  <th key={h} style={{padding:"7px 10px",textAlign:"left",color:"#64748b",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.4,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{activeTasks.map((t,i)=>{
                const ev=t.forecast_end&&TODAY>t.forecast_end?daysBetween(t.forecast_end,TODAY):null;
                return(
                  <tr key={t.id} style={{borderBottom:"1px solid #1e2535",background:t.critical==="Yes"?"#450a0a22":(i%2===0?"#1e253522":"transparent")}}>
                    <td style={{padding:"8px 10px",color:"#f1f5f9",fontWeight:t.critical==="Yes"?700:400}}>
                      {t.task}
                      {t.note&&<div style={{fontSize:10,color:"#64748b",marginTop:2,fontStyle:"italic"}}>{t.note}</div>}
                    </td>
                    <td style={{padding:"8px 10px",color:"#64748b",fontSize:11}}>{t.milestone_phase}</td>
                    <td style={{padding:"8px 10px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(t.forecast_end)}</td>
                    <td style={{padding:"8px 10px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:70,height:6,background:"#0f172a",borderRadius:3,overflow:"hidden"}}>
                          <div style={{width:`${t.complete}%`,height:"100%",background:t.complete>=80?"#22c55e":t.complete>=40?"#f59e0b":"#3b82f6",borderRadius:3}}/>
                        </div>
                        <span style={{fontSize:11,color:"#94a3b8"}}>{t.complete}%</span>
                        {ev!==null&&<VarBadge days={ev}/>}
                      </div>
                    </td>
                    <td style={{padding:"8px 10px",textAlign:"center"}}>{t.critical==="Yes"?<Badge label="Critical" color="#ef4444"/>:<span style={{color:"#475569",fontSize:11}}>—</span>}</td>
                    <td style={{padding:"8px 10px"}}><span style={{display:"flex",alignItems:"center"}}><Dot status={t.status}/>{t.status}</span></td>
                    <td style={{padding:"8px 10px"}}>{t.delay_reason?<Badge label={t.delay_reason} color="#ef4444"/>:<span style={{color:"#334155",fontSize:11}}>—</span>}</td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* Delay & Risk Register */}
      {delayedItems.length>0&&(
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Delay & Risk Register</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:"2px solid #334155"}}>
                {["Item","Type","Delay Reason","Fcst End","Actual End","Variance","Notes"].map(h=>(
                  <th key={h} style={{padding:"7px 10px",textAlign:"left",color:"#64748b",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.4,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{delayedItems.map((item,i)=>{
                const isMs="milestone"in item;
                const name=isMs?item.milestone:item.task;
                const fe=item.forecast_end, ae=item.actual_end;
                const ev=fe&&ae?daysBetween(fe,ae):(fe&&TODAY>fe?daysBetween(fe,TODAY):null);
                return(
                  <tr key={item.id} style={{borderBottom:"1px solid #1e2535",background:i%2===0?"#1e2535":"transparent"}}>
                    <td style={{padding:"8px 10px",color:"#f1f5f9",fontWeight:600,maxWidth:220}}>
                      {name}
                      {!isMs&&item.milestone_phase&&<div style={{fontSize:10,color:"#64748b",marginTop:2}}>{item.milestone_phase}</div>}
                    </td>
                    <td style={{padding:"8px 10px"}}><Badge label={isMs?"Milestone":"Task"} color={isMs?"#f59e0b":"#ef4444"}/></td>
                    <td style={{padding:"8px 10px",color:"#fca5a5",fontSize:11,maxWidth:200}}>{item.delay_reason}</td>
                    <td style={{padding:"8px 10px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(fe)}</td>
                    <td style={{padding:"8px 10px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(ae)||"—"}</td>
                    <td style={{padding:"8px 10px"}}><VarBadge days={ev}/></td>
                    <td style={{padding:"8px 10px",color:"#64748b",fontSize:11,fontStyle:"italic",maxWidth:240}}>{item.note||"—"}</td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* Upcoming 60 days */}
      {upcoming.length>0&&(
        <div>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Upcoming — Next 60 Days</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:"2px solid #334155"}}>
                {["Task","Milestone Phase","Forecast Start","Forecast End","Critical","Status","Note"].map(h=>(
                  <th key={h} style={{padding:"7px 10px",textAlign:"left",color:"#64748b",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.4,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{upcoming.map((t,i)=>(
                <tr key={t.id} style={{borderBottom:"1px solid #1e2535",background:t.critical==="Yes"?"#450a0a22":(i%2===0?"#1e253522":"transparent")}}>
                  <td style={{padding:"8px 10px",color:"#f1f5f9",fontWeight:t.critical==="Yes"?700:400}}>
                    {t.task}
                    {t.predecessor&&<div style={{fontSize:10,color:"#475569",marginTop:2}}>← {t.predecessor}</div>}
                  </td>
                  <td style={{padding:"8px 10px",color:"#64748b",fontSize:11}}>{t.milestone_phase}</td>
                  <td style={{padding:"8px 10px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(t.forecast_start)}</td>
                  <td style={{padding:"8px 10px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(t.forecast_end)}</td>
                  <td style={{padding:"8px 10px"}}>{t.critical==="Yes"?<Badge label="Critical" color="#ef4444"/>:<span style={{color:"#475569",fontSize:11}}>—</span>}</td>
                  <td style={{padding:"8px 10px"}}><span style={{display:"flex",alignItems:"center"}}><Dot status={t.status}/>{t.status}</span></td>
                  <td style={{padding:"8px 10px",color:"#64748b",fontSize:11,fontStyle:"italic",maxWidth:200}}>{t.note||"—"}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function MilestonesView({milestones,setMilestones}){
  const[form,setForm]=useState({...BLANK_MS});
  const[modal,setModal]=useState(null);
  const[phaseFilter,setPhaseFilter]=useState("All");
  const[statusFilter,setStatusFilter]=useState("All");
  const TODAY=todayStr();
  const save=f=>{setMilestones(prev=>f.id?prev.map(m=>m.id===f.id?f:m):[...prev,{...f,id:uid()}]);setModal(null);};
  const visible=milestones.filter(m=>(phaseFilter==="All"||m.phase===phaseFilter)&&(statusFilter==="All"||m.status===statusFilter));
  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>
          {["All",...MILESTONE_PHASES].map(p=><button key={p} onClick={()=>setPhaseFilter(p)} style={{padding:"5px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:phaseFilter===p?phaseColor[p]||"#3b82f6":"#1e2535",color:phaseFilter===p?"#fff":"#64748b"}}>{p==="All"?"All Phases":p}</button>)}
        </div>
        <Sel value={statusFilter} onChange={setStatusFilter} options={["All",...MILESTONE_STATUS]}/>
        <TabToolbar tab="milestones" onImport={(items,mode)=>setMilestones(mode==="replace"?items:prev=>[...prev,...items])}/>
        <button onClick={()=>{setForm({...BLANK_MS});setModal("add");}} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Add</button>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{borderBottom:"2px solid #334155"}}>{["Milestone","Phase","Fcst Start","Fcst End","Actual Start","Actual End","Start Var","End Var","Status","Delay",""].map(h=><th key={h} style={{padding:"7px 9px",textAlign:"left",color:"#64748b",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.4,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>{visible.map(m=>{
            const sv=m.actual_start&&m.forecast_start?daysBetween(m.forecast_start,m.actual_start):null;
            const ev=m.actual_end&&m.forecast_end?daysBetween(m.forecast_end,m.actual_end):(m.status==="In Progress"&&m.forecast_end&&TODAY>m.forecast_end?daysBetween(m.forecast_end,TODAY):null);
            const ph=phaseColor[m.phase]||"#64748b";
            return(
              <tr key={m.id} style={{borderBottom:"1px solid #1e2535"}} onMouseEnter={e=>e.currentTarget.style.background="#1e2535"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <td style={{padding:"9px 9px",color:"#f1f5f9",fontWeight:600,minWidth:200}}>{m.milestone}{m.note&&<div style={{fontSize:10,color:"#64748b",marginTop:2,fontWeight:400}}>{m.note}</div>}</td>
                <td style={{padding:"9px 9px"}}><Badge label={m.phase.replace("Phase ","Ph ")} color={ph}/></td>
                <td style={{padding:"9px 9px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(m.forecast_start)}</td>
                <td style={{padding:"9px 9px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(m.forecast_end)}</td>
                <td style={{padding:"9px 9px",color:"#f1f5f9",whiteSpace:"nowrap"}}>{fmtDate(m.actual_start)||"—"}</td>
                <td style={{padding:"9px 9px",color:"#f1f5f9",whiteSpace:"nowrap"}}>{fmtDate(m.actual_end)||"—"}</td>
                <td style={{padding:"9px 9px"}}><VarBadge days={sv}/></td>
                <td style={{padding:"9px 9px"}}><VarBadge days={ev}/></td>
                <td style={{padding:"9px 9px"}}><span style={{display:"flex",alignItems:"center"}}><Dot status={m.status}/>{m.status}</span></td>
                <td style={{padding:"9px 9px"}}>{m.delay_reason?<Badge label={m.delay_reason} color="#ef4444"/>:<span style={{color:"#334155",fontSize:11}}>—</span>}</td>
                <td style={{padding:"9px 9px"}}>
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={()=>{setForm({...m});setModal("edit");}} style={{background:"#334155",border:"none",borderRadius:5,padding:"3px 8px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>Edit</button>
                    <button onClick={()=>setMilestones(prev=>prev.filter(x=>x.id!==m.id))} style={{background:"#450a0a",border:"none",borderRadius:5,padding:"3px 8px",color:"#fca5a5",cursor:"pointer",fontSize:11}}>Del</button>
                  </div>
                </td>
              </tr>
            );
          })}</tbody>
        </table>
      </div>
      {modal&&(
        <Modal title={modal==="add"?"Add Milestone":"Edit Milestone"} onClose={()=>setModal(null)} wide>
          <Field label="Milestone Name"><input value={form.milestone} onChange={e=>setForm(f=>({...f,milestone:e.target.value}))} style={inp} placeholder="e.g. Plasterboard complete"/></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Phase"><Sel value={form.phase} onChange={v=>setForm(f=>({...f,phase:v}))} options={MILESTONE_PHASES}/></Field>
            <Field label="Status"><Sel value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={MILESTONE_STATUS}/></Field>
            <Field label="Forecast Start"><input type="date" value={form.forecast_start} onChange={e=>setForm(f=>({...f,forecast_start:e.target.value}))} style={inp}/></Field>
            <Field label="Forecast End"><input type="date" value={form.forecast_end} onChange={e=>setForm(f=>({...f,forecast_end:e.target.value}))} style={inp}/></Field>
            <Field label="Actual Start"><input type="date" value={form.actual_start} onChange={e=>setForm(f=>({...f,actual_start:e.target.value}))} style={inp}/></Field>
            <Field label="Actual End"><input type="date" value={form.actual_end} onChange={e=>setForm(f=>({...f,actual_end:e.target.value}))} style={inp}/></Field>
            <Field label="Delay Reason"><Sel value={form.delay_reason} onChange={v=>setForm(f=>({...f,delay_reason:v}))} options={DELAY_REASONS}/></Field>
          </div>
          <Field label="Notes"><input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={inp} placeholder="Optional"/></Field>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
            <button onClick={()=>setModal(null)} style={{background:"#334155",border:"none",borderRadius:8,padding:"9px 20px",color:"#94a3b8",cursor:"pointer",fontWeight:600}}>Cancel</button>
            <button onClick={()=>save(form)} style={{background:"#3b82f6",border:"none",borderRadius:8,padding:"9px 20px",color:"#fff",cursor:"pointer",fontWeight:700}}>Save</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function TasksView({tasks,setTasks}){
  const[form,setForm]=useState({...BLANK_TASK});
  const[modal,setModal]=useState(null);
  const[statusFilter,setStatusFilter]=useState("All");
  const[critFilter,setCritFilter]=useState("All");
  const TODAY=todayStr();
  const save=f=>{setTasks(prev=>f.id?prev.map(t=>t.id===f.id?f:t):[...prev,{...f,id:uid()}]);setModal(null);};
  const visible=tasks.filter(t=>(statusFilter==="All"||t.status===statusFilter)&&(critFilter==="All"||(critFilter==="Critical"&&t.critical==="Yes")));
  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>
          {["All","Critical",...TASK_STATUS].map(s=>{
            const active=(s==="Critical"&&critFilter==="Critical")||(s!=="Critical"&&s!=="All"&&statusFilter===s&&critFilter!=="Critical")||(s==="All"&&statusFilter==="All"&&critFilter==="All");
            return <button key={s} onClick={()=>{if(s==="Critical"){setCritFilter("Critical");setStatusFilter("All");}else{setCritFilter("All");setStatusFilter(s);}}} style={{padding:"5px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:active?"#3b82f6":"#1e2535",color:active?"#fff":"#64748b"}}>{s}</button>;
          })}
        </div>
        <TabToolbar tab="tasks" onImport={(items,mode)=>setTasks(mode==="replace"?items:prev=>[...prev,...items])}/>
        <button onClick={()=>{setForm({...BLANK_TASK});setModal("add");}} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Add</button>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{borderBottom:"2px solid #334155"}}>{["Task","Phase / Category","Crit","Fcst Start","Fcst End","Act Start","Act End","Progress","Status","Delay",""].map(h=><th key={h} style={{padding:"7px 9px",textAlign:"left",color:"#64748b",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.4,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>{visible.map(t=>{
            const ev=t.actual_end&&t.forecast_end?daysBetween(t.forecast_end,t.actual_end):(t.status==="In Progress"&&t.forecast_end&&TODAY>t.forecast_end?daysBetween(t.forecast_end,TODAY):null);
            return(
              <tr key={t.id} style={{borderBottom:"1px solid #1e2535"}} onMouseEnter={e=>e.currentTarget.style.background="#1e2535"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <td style={{padding:"9px 9px",color:"#f1f5f9",fontWeight:t.critical==="Yes"?700:400,minWidth:160}}>
                  {t.task}
                  {t.predecessor&&<div style={{fontSize:10,color:"#475569",marginTop:1}}>← {t.predecessor}</div>}
                </td>
                <td style={{padding:"9px 9px"}}>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{t.milestone_phase}</div>
                  {t.cost_category&&<div style={{fontSize:10,color:"#475569",marginTop:1}}>{t.cost_category}</div>}
                </td>
                <td style={{padding:"9px 9px",textAlign:"center"}}>{t.critical==="Yes"?<span style={{color:"#ef4444",fontWeight:700,fontSize:11}}>🔴</span>:<span style={{color:"#334155",fontSize:11}}>—</span>}</td>
                <td style={{padding:"9px 9px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(t.forecast_start)}</td>
                <td style={{padding:"9px 9px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(t.forecast_end)}</td>
                <td style={{padding:"9px 9px",color:"#f1f5f9",whiteSpace:"nowrap"}}>{fmtDate(t.actual_start)||"—"}</td>
                <td style={{padding:"9px 9px",color:"#f1f5f9",whiteSpace:"nowrap"}}>{fmtDate(t.actual_end)||"—"}</td>
                <td style={{padding:"9px 9px",minWidth:90}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{flex:1,background:"#0f172a",borderRadius:3,height:5,overflow:"hidden"}}>
                      <div style={{width:`${t.complete}%`,height:"100%",background:t.complete===100?"#22c55e":t.status==="Delayed"?"#ef4444":"#3b82f6",borderRadius:3}}/>
                    </div>
                    <span style={{fontSize:10,color:"#94a3b8",width:24,textAlign:"right"}}>{t.complete}%</span>
                  </div>
                </td>
                <td style={{padding:"9px 9px"}}><span style={{display:"flex",alignItems:"center"}}><Dot status={t.status}/>{t.status}</span></td>
                <td style={{padding:"9px 9px"}}>{t.delay_reason?<Badge label={t.delay_reason} color="#ef4444"/>:<VarBadge days={ev}/>}</td>
                <td style={{padding:"9px 9px"}}>
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={()=>{setForm({...t});setModal("edit");}} style={{background:"#334155",border:"none",borderRadius:5,padding:"3px 8px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>Edit</button>
                    <button onClick={()=>setTasks(prev=>prev.filter(x=>x.id!==t.id))} style={{background:"#450a0a",border:"none",borderRadius:5,padding:"3px 8px",color:"#fca5a5",cursor:"pointer",fontSize:11}}>Del</button>
                  </div>
                </td>
              </tr>
            );
          })}</tbody>
        </table>
      </div>
      {modal&&(
        <Modal title={modal==="add"?"Add Task":"Edit Task"} onClose={()=>setModal(null)} wide>
          <Field label="Task Name"><input value={form.task} onChange={e=>setForm(f=>({...f,task:e.target.value}))} style={inp} placeholder="e.g. Installation of internal tiles"/></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Milestone Phase"><input value={form.milestone_phase} onChange={e=>setForm(f=>({...f,milestone_phase:e.target.value}))} style={inp} placeholder="e.g. PLASTERBOARD"/></Field>
            <Field label="Cost Category"><input value={form.cost_category} onChange={e=>setForm(f=>({...f,cost_category:e.target.value}))} style={inp} placeholder="e.g. Tiling Labour"/></Field>
            <Field label="Critical Path?">
              <div style={{display:"flex",gap:12,marginTop:4}}>
                {["Yes","No"].map(v=><label key={v} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",color:"#94a3b8",fontSize:13}}><input type="radio" checked={form.critical===v} onChange={()=>setForm(f=>({...f,critical:v}))} style={{accentColor:"#3b82f6"}}/>{v}</label>)}
              </div>
            </Field>
            <Field label="Status"><Sel value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={TASK_STATUS}/></Field>
            <Field label="Forecast Start"><input type="date" value={form.forecast_start} onChange={e=>setForm(f=>({...f,forecast_start:e.target.value}))} style={inp}/></Field>
            <Field label="Forecast End"><input type="date" value={form.forecast_end} onChange={e=>setForm(f=>({...f,forecast_end:e.target.value}))} style={inp}/></Field>
            <Field label="Actual Start"><input type="date" value={form.actual_start} onChange={e=>setForm(f=>({...f,actual_start:e.target.value}))} style={inp}/></Field>
            <Field label="Actual End"><input type="date" value={form.actual_end} onChange={e=>setForm(f=>({...f,actual_end:e.target.value}))} style={inp}/></Field>
            <Field label="% Complete"><input type="number" min={0} max={100} value={form.complete} onChange={e=>setForm(f=>({...f,complete:parseInt(e.target.value)||0}))} style={inp}/></Field>
            <Field label="Delay Reason"><Sel value={form.delay_reason} onChange={v=>setForm(f=>({...f,delay_reason:v}))} options={DELAY_REASONS}/></Field>
          </div>
          <Field label="Predecessor"><input value={form.predecessor} onChange={e=>setForm(f=>({...f,predecessor:e.target.value}))} style={inp} placeholder="Task that must complete first"/></Field>
          <Field label="Notes"><input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={inp} placeholder="Optional"/></Field>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
            <button onClick={()=>setModal(null)} style={{background:"#334155",border:"none",borderRadius:8,padding:"9px 20px",color:"#94a3b8",cursor:"pointer",fontWeight:600}}>Cancel</button>
            <button onClick={()=>save(form)} style={{background:"#3b82f6",border:"none",borderRadius:8,padding:"9px 20px",color:"#fff",cursor:"pointer",fontWeight:700}}>Save</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ProgramTab({milestones,setMilestones,tasks,setTasks}){
  const[view,setView]=useState("dashboard");
  return(
    <div>
      <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:"1px solid #334155"}}>
        {[["dashboard","📊 Dashboard"],["milestones","🏁 Milestones"],["tasks","🔧 Tasks"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{background:"none",border:"none",borderBottom:`2px solid ${view===v?"#3b82f6":"transparent"}`,padding:"10px 16px",color:view===v?"#f1f5f9":"#64748b",cursor:"pointer",fontWeight:600,fontSize:13}}>
            {l}
            {v==="milestones"&&<span style={{marginLeft:6,background:"#334155",borderRadius:10,padding:"1px 6px",fontSize:10,color:"#94a3b8"}}>{milestones.length}</span>}
            {v==="tasks"&&<span style={{marginLeft:6,background:"#334155",borderRadius:10,padding:"1px 6px",fontSize:10,color:"#94a3b8"}}>{tasks.length}</span>}
          </button>
        ))}
      </div>
      {view==="dashboard"&&<ProgramDashboard milestones={milestones} tasks={tasks}/>}
      {view==="milestones"&&<MilestonesView milestones={milestones} setMilestones={setMilestones}/>}
      {view==="tasks"&&<TasksView tasks={tasks} setTasks={setTasks}/>}
    </div>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// COSTS TAB — 4 sub-views: Summary | Milestones | PSPC | Variations
// reads from: reno_milestones_costs_v2, reno_pspc_v2, reno_variations_v2
// ══════════════════════════════════════════════════════════════════════════════

const MS_STATUS_COLOR  = {"Paid":"#22c55e","Claimed":"#f59e0b","Upcoming":"#475569","Under dispute":"#ef4444"};
const PSPC_STATUS_COLOR= {"Confirmed":"#22c55e","Not Confirmed":"#f59e0b","Paid":"#6366f1"};
const VAR_STATUS_COLOR = {"Approved":"#22c55e","Pending":"#f59e0b","Paid":"#6366f1"};

function CostKPI({label,value,sub,color,accent}){
  return(
    <div style={{background:accent||"#1e2535",borderRadius:10,padding:"14px 16px",borderTop:`3px solid ${color}`}}>
      <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>{label}</div>
      <div style={{fontSize:22,fontWeight:800,color,marginBottom:2}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:"#64748b",fontStyle:"italic"}}>{sub}</div>}
    </div>
  );
}

function StatusPill({label,colorMap}){
  const color=colorMap[label]||"#64748b";
  return <span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{label}</span>;
}

// ── Cost Summary sub-view ─────────────────────────────────────────────────────
function CostSummaryView({summary,milestones,pspc,variations}){
  if(!summary) return <div style={{color:"#64748b",padding:20}}>Loading cost summary…</div>;

  const {
    contract_ex, paid_to_date_ex, forecast_ex,
    approved_vars_ex, work_completed_ex,
    pspc_to_confirm_ex, pspc_total_allowance_ex, pspc_pct_to_confirm,
  } = summary;

  const forecastDelta = forecast_ex - contract_ex;
  const msPaid    = milestones.filter(m=>m.status==="Paid").length;
  const msClaimed = milestones.filter(m=>m.status==="Claimed").length;
  const msTotal   = milestones.length;
  const paidPct   = (msPaid/msTotal)*100;
  const pspcConf  = pspc.filter(p=>p.status==="Confirmed"||p.status==="Paid").length;
  const pspcTotal = pspc.length;
  const critUnconf= pspc.filter(p=>p.critical_path==="Yes"&&p.status==="Not Confirmed");

  return(
    <div>
      {/* KPI grid — all ex GST */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:12,marginBottom:8}}>
        <CostKPI label="Contract Price (ex GST)"           value={fmtAUD(contract_ex)}                          color="#3b82f6" accent="#1e3a5f"/>
        <CostKPI label="Costs Paid to Date (ex GST)"       value={fmtAUD(paid_to_date_ex)}                      color="#22c55e" accent="#14532d" sub={`${fmtAUD(paid_to_date_ex*1.1)} inc GST`}/>
        <CostKPI label="Forecast Total Cost (ex GST)"      value={fmtAUD(forecast_ex)}                          color={forecastDelta>0?"#ef4444":"#22c55e"} accent={forecastDelta>0?"#450a0a":"#14532d"} sub={`${forecastDelta>=0?"+":""}${fmtAUD(forecastDelta)} vs contract`}/>
        <CostKPI label="Approved Variations (ex GST)"      value={fmtAUD(approved_vars_ex)}                     color="#dc2626" accent="#450a0a"/>
        <CostKPI label="Work Completed to Date (ex GST)"   value={fmtAUD(work_completed_ex)}                    color="#6366f1" accent="#1e1b4b" sub="value of trade work done"/>
        <CostKPI label="Estimated Builder Float (ex GST)"  value={fmtAUD(paid_to_date_ex-work_completed_ex)}    color="#0891b2" accent="#0c4a6e" sub="costs paid to date − work completed"/>
        <CostKPI label="PS/PC Left to Confirm (ex GST)"    value={fmtAUD(pspc_to_confirm_ex)}                   color="#f59e0b" accent="#78350f" sub={`${(pspc_pct_to_confirm*100).toFixed(1)}% of total PS/PC allowance`}/>
      </div>
      <div style={{fontSize:10,color:"#475569",marginBottom:20,textAlign:"right",fontStyle:"italic"}}>All amounts ex GST unless noted</div>

      {/* Milestone progress */}
      <div style={{background:"#1e2535",borderRadius:10,padding:"16px 18px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5}}>Milestone Payments</div>
          <div style={{fontSize:12,color:"#94a3b8"}}>{msPaid} of {msTotal} paid · {fmtAUD(paid_to_date_ex)} ex GST</div>
        </div>
        <div style={{height:8,background:"#0f172a",borderRadius:4,overflow:"hidden",marginBottom:8}}>
          <div style={{height:"100%",width:`${paidPct}%`,background:"#22c55e",borderRadius:4,transition:"width .4s"}}/>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {milestones.map(m=>(
            <div key={m.id} title={m.milestone} style={{width:28,height:28,borderRadius:6,background:MS_STATUS_COLOR[m.status]||"#334155",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#fff",cursor:"default"}}>
              {m.id}
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:16,marginTop:10}}>
          {[["Paid","#22c55e"],["Claimed","#f59e0b"],["Upcoming","#475569"]].map(([l,c])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#64748b"}}>
              <span style={{width:10,height:10,borderRadius:2,background:c,display:"inline-block"}}/>
              {l} ({milestones.filter(m=>m.status===l).length})
            </div>
          ))}
        </div>
      </div>

      {/* PS/PC progress */}
      <div style={{background:"#1e2535",borderRadius:10,padding:"16px 18px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5}}>PS/PC Confirmation</div>
          <div style={{fontSize:12,color:"#94a3b8"}}>{pspcConf} of {pspcTotal} confirmed · {fmtAUD(pspc_to_confirm_ex)} ex GST left to confirm</div>
        </div>
        <div style={{height:8,background:"#0f172a",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${(pspcConf/pspcTotal)*100}%`,background:"#22c55e",borderRadius:4}}/></div>
      </div>

      {/* Critical unconfirmed alert */}
      {critUnconf.length>0&&(
        <div style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:8,padding:"12px 16px",marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#ef4444",marginBottom:8}}>🚨 CRITICAL PATH — PS/PC items not yet confirmed</div>
          {critUnconf.map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #ef444420"}}>
              <div>
                <span style={{color:"#fca5a5",fontSize:13,fontWeight:600}}>{p.type} — {p.description}</span>
                {p.supplier&&<span style={{color:"#64748b",fontSize:11,marginLeft:8}}>{p.supplier}</span>}
              </div>
              <span style={{color:"#f59e0b",fontSize:12,fontWeight:700}}>{fmtAUD(p.allowance)} allowance</span>
            </div>
          ))}
        </div>
      )}

      {/* Variations summary */}
      {variations.length>0&&(
        <div style={{background:"#1e2535",borderRadius:10,padding:"16px 18px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Variations</div>
          <div style={{display:"grid",gap:6}}>
            {variations.map(v=>{
              const totalEx = v.amount_ex*1.2;
              return(
                <div key={v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #334155"}}>
                  <div>
                    <span style={{color:"#94a3b8",fontSize:11,fontWeight:700,marginRight:8}}>{v.vo_number}</span>
                    <span style={{color:"#f1f5f9",fontSize:12}}>{v.description}</span>
                    {v.accounted_in_pspc==="Yes"&&<span style={{marginLeft:8,color:"#64748b",fontSize:10,fontStyle:"italic"}}>↳ in PS/PC register</span>}
                  </div>
                  <div style={{display:"flex",gap:10,alignItems:"center",flexShrink:0}}>
                    <span style={{color:"#f1f5f9",fontSize:12,fontWeight:600}}>{fmtAUD(totalEx)} ex</span>
                    <StatusPill label={v.status} colorMap={VAR_STATUS_COLOR}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Milestones sub-view ───────────────────────────────────────────────────────
function CostMilestonesView({milestones}){
  const CONTRACT_TOTAL_INC = milestones.reduce((s,m)=>s+(m.contract_amount||0),0);
  const CONTRACT_TOTAL_EX  = CONTRACT_TOTAL_INC/1.1;
  const PAID_TOTAL_INC = milestones.filter(m=>m.status==="Paid").reduce((s,m)=>s+(m.paid_amount||m.contract_amount||0),0);
  const PAID_TOTAL_EX  = PAID_TOTAL_INC/1.1;
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:10,marginBottom:16}}>
        <CostKPI label="Contract Total (ex GST)"  value={fmtAUD(CONTRACT_TOTAL_EX)}  color="#3b82f6" sub={`${fmtAUD(CONTRACT_TOTAL_INC)} inc GST`}/>
        <CostKPI label="Total Paid (ex GST)"      value={fmtAUD(PAID_TOTAL_EX)}      color="#22c55e" sub={`${milestones.filter(m=>m.status==="Paid").length} of ${milestones.length} milestones`}/>
        <CostKPI label="Outstanding (ex GST)"     value={fmtAUD(CONTRACT_TOTAL_EX-PAID_TOTAL_EX)} color="#f59e0b" sub={`${milestones.filter(m=>m.status!=="Paid").length} remaining`}/>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{borderBottom:"2px solid #334155"}}>
            {["#","Milestone","Original (inc GST)","Original (ex GST)","Paid (inc GST)","Paid (ex GST)","Invoice Ref","Date Claimed","Date Paid","Status","Notes"].map(h=>(
              <th key={h} style={{padding:"7px 9px",textAlign:"left",color:"#64748b",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.4,whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>{milestones.map((m,i)=>{
            const paidInc = m.paid_amount!==null&&m.paid_amount!==undefined ? m.paid_amount : (m.status==="Paid"?m.contract_amount:null);
            const paidEx  = paidInc!==null ? paidInc/1.1 : null;
            const origEx  = m.contract_amount/1.1;
            return(
              <tr key={m.id} style={{borderBottom:"1px solid #1e2535"}} onMouseEnter={e=>e.currentTarget.style.background="#1e2535"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <td style={{padding:"9px 9px",color:"#94a3b8",fontWeight:700,textAlign:"center"}}>{m.id}</td>

// ── PSPC sub-view ─────────────────────────────────────────────────────────────
function CostPSPCView({pspc}){
  const[typeFilter,setTypeFilter]=useState("All");
  const[statusFilter,setStatusFilter]=useState("All");

  const visible=pspc.filter(p=>(typeFilter==="All"||p.type===typeFilter)&&(statusFilter==="All"||p.status===statusFilter));
  const totalAllowance=pspc.reduce((s,p)=>s+(p.allowance||0),0);

  // Total Actual Confirmed = actual + overrun margin, for Confirmed items only
  const confirmedItems=pspc.filter(p=>p.status==="Confirmed"||p.status==="Paid");
  const totalActualConf=confirmedItems.reduce((s,p)=>{
    const a=p.actual??0;
    const margin=a>(p.allowance||0)?(a-(p.allowance||0))*0.2:0;
    return s+a+margin;
  },0);
  const confAllowance=confirmedItems.reduce((s,p)=>s+(p.allowance||0),0);
  // Net variance = confirmed total (actual+margin) minus confirmed allowance
  const netVarianceConf=totalActualConf-confAllowance;

  const toConfirm=pspc.filter(p=>p.status==="Not Confirmed").reduce((s,p)=>s+(p.allowance||0),0);
  // Forecast PS/PC total = confirmed total (actual+margin) + value left to confirm
  const forecastPSPC=totalActualConf+toConfirm;

  const totalPaidEx    = pspc.reduce((s,p)=>s+(p.paid_ex||0),0);
  const totalPaidVarEx = pspc.reduce((s,p)=>s+(p.var_paid_ex||0),0);

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:10,marginBottom:16}}>
        <CostKPI label="Total PS/PC Allowance (ex GST)"    value={fmtAUD(totalAllowance)}  color="#7c3aed"/>
        <CostKPI label="Total Actual Confirmed (ex GST)"   value={fmtAUD(totalActualConf)} color="#22c55e" sub="actual + overrun margin, confirmed only"/>
        <CostKPI label="Net Variance — Confirmed (ex GST)" value={fmtAUD(netVarianceConf)} color={netVarianceConf>0?"#ef4444":"#22c55e"} sub={netVarianceConf>0?"over allowance":"under allowance"}/>
        <CostKPI label="Forecast PS/PC Total (ex GST)"     value={fmtAUD(forecastPSPC)}    color="#a78bfa" sub="confirmed + left to confirm"/>
        <CostKPI label="Paid PS/PC (ex GST)"               value={fmtAUD(totalPaidEx)}     color="#3b82f6" sub="actual amounts paid to date"/>
        <CostKPI label="Paid PS/PC Variance (ex GST)"      value={fmtAUD(totalPaidVarEx)}  color={totalPaidVarEx>0?"#ef4444":"#22c55e"} sub={totalPaidVarEx>0?"over allowance on paid items":"under allowance on paid items"}/>
        <CostKPI label="Value to Confirm (ex GST)"         value={fmtAUD(toConfirm)}       color="#f59e0b" sub={`${pspc.filter(p=>p.status==="Not Confirmed").length} items unconfirmed`}/>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {["All","PS","PC"].map(t=>(
            <button key={t} onClick={()=>setTypeFilter(t)} style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:typeFilter===t?"#7c3aed":"#1e2535",color:typeFilter===t?"#fff":"#64748b"}}>{t==="All"?"All Types":t==="PS"?"Provisional Sums":"Prime Costs"}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {["All","Confirmed","Not Confirmed","Paid"].map(s=>(
            <button key={s} onClick={()=>setStatusFilter(s)} style={{padding:"5px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:statusFilter===s?PSPC_STATUS_COLOR[s]||"#3b82f6":"#1e2535",color:statusFilter===s?"#fff":"#64748b"}}>{s}</button>
          ))}
        </div>
      </div>

      {/* Subtotals bar — updates live with filter */}
      {(()=>{
        const subAllow   = visible.reduce((s,p)=>s+(p.allowance||0),0);
        const subActual  = visible.filter(p=>p.actual!==null&&p.actual!==undefined).reduce((s,p)=>s+(p.actual||0),0);
        const subMargin  = visible.reduce((s,p)=>{
          const a=p.actual; if(a===null||a===undefined) return s;
          return a>(p.allowance||0)?s+(a-(p.allowance||0))*0.2:s;
        },0);
        const subTotalEx = visible.reduce((s,p)=>{
          const a=p.actual; if(a===null||a===undefined) return s+(p.allowance||0);
          const m=a>(p.allowance||0)?(a-(p.allowance||0))*0.2:0; return s+a+m;
        },0);
        const subTotalInc = subTotalEx*1.1;
        const subVariance = subActual - subAllow;
        const subPaid    = visible.reduce((s,p)=>s+(p.paid_ex||0),0);
        const filterLabel = [typeFilter!=="All"?typeFilter:null, statusFilter!=="All"?statusFilter:null].filter(Boolean).join(" · ") || "All items";
        return(
          <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"10px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:0,flexWrap:"wrap"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginRight:16,whiteSpace:"nowrap"}}>
              {filterLabel} <span style={{color:"#334155",fontWeight:400}}>({visible.length} items)</span>
            </div>
            {[
              ["Allowance",    subAllow,    "#94a3b8"],
              ["Actual",       subActual,   "#f1f5f9"],
              ["Variance",     subVariance, subVariance>0?"#ef4444":"#22c55e"],
              ["Margin",       subMargin,   subMargin>0?"#ef4444":"#475569"],
              ["Total (ex)",   subTotalEx,  "#f1f5f9"],
              ["Total (inc)",  subTotalInc, "#a78bfa"],
              ["Paid (ex)",    subPaid,     "#22c55e"],
            ].map(([label,val,color],i)=>(
              <div key={label} style={{display:"flex",flexDirection:"column",alignItems:"flex-end",padding:"0 14px",borderLeft:i>0?"1px solid #1e2535":"none"}}>
                <div style={{fontSize:9,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:.4,marginBottom:2}}>{label}</div>
                <div style={{fontSize:13,fontWeight:700,color,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>
                  {label==="Variance"&&val>0?"+":""}{fmtAUD(val)}
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{borderBottom:"2px solid #334155"}}>
            {["Type","Description","Category","Allowance (ex)","Actual (ex)","Variance","Margin","Total (inc)","Status","Conf. Date","CP?","Supplier","Notes"].map(h=>(
              <th key={h} style={{padding:"7px 9px",textAlign:"left",color:"#64748b",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.4,whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>{visible.map((p,i)=>{
            const actual   = p.actual;
            const hasActual= actual!==null&&actual!==undefined;
            const variance = hasActual ? actual-(p.allowance||0) : null;
            const margin   = hasActual&&actual>(p.allowance||0) ? (actual-(p.allowance||0))*0.2 : 0;
            const totalInc = hasActual ? (actual+margin)*1.1 : (p.allowance||0)*1.1;
            const isCP = p.critical_path==="Yes";
            return(
              <tr key={p.id} style={{borderBottom:"1px solid #1e2535",background:isCP&&p.status==="Not Confirmed"?"#78350f11":"transparent"}} onMouseEnter={e=>e.currentTarget.style.background="#1e2535"} onMouseLeave={e=>e.currentTarget.style.background=isCP&&p.status==="Not Confirmed"?"#78350f11":"transparent"}>
                <td style={{padding:"8px 9px",textAlign:"center"}}>
                  <span style={{background:p.type==="PS"?"#1e40af22":"#6d28d922",color:p.type==="PS"?"#60a5fa":"#c084fc",border:`1px solid ${p.type==="PS"?"#1e40af44":"#6d28d944"}`,borderRadius:3,padding:"1px 6px",fontSize:10,fontWeight:700}}>{p.type}</span>
                </td>
                <td style={{padding:"8px 9px",color:"#f1f5f9",fontWeight:isCP?700:400,maxWidth:200}}>{p.description}{isCP&&<span style={{marginLeft:6,color:"#f59e0b",fontSize:9,fontWeight:700}}>CP</span>}</td>
                <td style={{padding:"8px 9px",color:"#64748b",fontSize:11}}>{p.category}</td>
                <td style={{padding:"8px 9px",color:"#94a3b8",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{fmtAUD(p.allowance||0)}</td>
                <td style={{padding:"8px 9px",color:hasActual?"#f1f5f9":"#475569",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{hasActual?fmtAUD(actual):"—"}</td>
                <td style={{padding:"8px 9px",color:variance>0?"#ef4444":variance<0?"#22c55e":"#64748b",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>
                  {variance!==null?(variance===0?"—":(variance>0?"+":"")+fmtAUD(variance)):"—"}
                </td>
                <td style={{padding:"8px 9px",color:margin>0?"#ef4444":"#334155",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{margin>0?fmtAUD(margin):"—"}</td>
                <td style={{padding:"8px 9px",color:"#f1f5f9",fontWeight:600,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{fmtAUD(totalInc)}</td>
                <td style={{padding:"8px 9px"}}><StatusPill label={p.status} colorMap={PSPC_STATUS_COLOR}/></td>
                <td style={{padding:"8px 9px",color:"#64748b",fontSize:11,whiteSpace:"nowrap"}}>{p.date_confirmed||"—"}</td>
                <td style={{padding:"8px 9px",textAlign:"center"}}>{isCP?<span style={{color:"#f59e0b",fontWeight:700,fontSize:11}}>⚠</span>:<span style={{color:"#334155"}}>—</span>}</td>
                <td style={{padding:"8px 9px",color:"#94a3b8",fontSize:11,whiteSpace:"nowrap"}}>{p.supplier||"—"}</td>
                <td style={{padding:"8px 9px",color:"#64748b",fontSize:11,maxWidth:180,fontStyle:"italic"}}>{p.notes||"—"}</td>
              </tr>
            );
          })}</tbody>
        </table>
      </div>
    </div>
  );
}

// ── CostsTab root ─────────────────────────────────────────────────────────────
function CostsTab(){
  const[view,setView]=useState("summary");
  const[milestones,setMilestones]=useState(null);
  const[pspc,setPspc]=useState(null);
  const[variations,setVariations]=useState(null);
  const[loaded,setLoaded]=useState(false);

  // Load from storage, fall back to seed data
  useEffect(()=>{
    (async()=>{
      try{
        const[m,p,v]=await Promise.all([
          window.storage.get("reno_milestones_costs_v3").catch(()=>null),
          window.storage.get("reno_pspc_v3").catch(()=>null),
          window.storage.get("reno_variations_v2").catch(()=>null),
        ]);
        setMilestones(m?JSON.parse(m.value):SEED_MILESTONES_COSTS);
        setPspc(p?JSON.parse(p.value):SEED_PSPC);
        setVariations(v?JSON.parse(v.value):SEED_VARIATIONS);
      }catch(e){
        setMilestones(SEED_MILESTONES_COSTS);
        setPspc(SEED_PSPC);
        setVariations(SEED_VARIATIONS);
      }
      setLoaded(true);
    })();
  },[]);

  // Persist any changes back to storage
  useEffect(()=>{
    if(!loaded||!milestones) return;
    const t=setTimeout(async()=>{
      try{
        await Promise.all([
          window.storage.set("reno_milestones_costs_v3",JSON.stringify(milestones)),
          window.storage.set("reno_pspc_v3",JSON.stringify(pspc)),
          window.storage.set("reno_variations_v2",JSON.stringify(variations)),
        ]);
      }catch(e){}
    },800);
    return()=>clearTimeout(t);
  },[milestones,pspc,variations,loaded]);

  if(!loaded) return <div style={{color:"#64748b",padding:20,textAlign:"center"}}>Loading cost data…</div>;

  // ── KPI calculations — matching spreadsheet Summary tab logic ─────────────
  const CONTRACT_INC = 1929803.55;
  const CONTRACT_EX  = CONTRACT_INC / 1.1;  // 1,754,367

  // Costs paid to date (ex GST) = contract payments ex + net variation of paid PS/PC ex + approved non-PSPC variations ex
  const paidMsEx   = milestones.filter(m=>m.status==="Paid").reduce((s,m)=>s+(m.paid_amount||m.contract_amount||0),0) / 1.1;
  const paidPSPCEx = pspc.reduce((s,p)=>s+(p.paid_ex||0),0);
  const paidPSPCVarEx = pspc.reduce((s,p)=>s+(p.var_paid_ex||0),0);
  const apprVarsNonPSPCEx = variations.filter(v=>v.status==="Approved"&&v.accounted_in_pspc==="No")
    .reduce((s,v)=>s+(v.amount_ex*1.2),0);
  const paidToDateEx = paidMsEx + paidPSPCVarEx + apprVarsNonPSPCEx;
  const paidToDateInc = paidToDateEx * 1.1;

  // Forecast total (ex GST) = contract ex + net variation of remaining confirmed PS/PC ex + non-PSPC non-approved variations ex
  const confRemainingPSPCVarEx = pspc.reduce((s,p)=>{
    if(p.actual===null||p.actual===undefined) return s;
    const margin = p.actual > p.allowance ? (p.actual - p.allowance)*0.2 : 0;
    const totalActual = p.actual + margin;
    return s + (totalActual - p.allowance);
  },0);
  // Subtract what's already in paid to avoid double count
  const unpaidConfVarEx = confRemainingPSPCVarEx - paidPSPCVarEx;
  const nonApprVarsEx = variations.filter(v=>v.accounted_in_pspc==="No")
    .reduce((s,v)=>s+(v.amount_ex*1.2),0);
  const forecastEx  = CONTRACT_EX + unpaidConfVarEx + nonApprVarsEx;
  const forecastInc = forecastEx * 1.1;

  // Value of work completed to date (ex GST) — milestones 1-6 paid = sum their trade allowance portions
  // From spreadsheet: SUMPRODUCT of paid milestone trade allocations = 915,057 ex GST
  const WORK_COMPLETED_EX = 915057.01;

  // Approved variations (ex GST, not accounted in PSPC)
  const apprVarTotalEx  = variations.filter(v=>v.status==="Approved").reduce((s,v)=>s+(v.amount_ex*1.2),0);
  const apprVarNonPspcEx = apprVarsNonPSPCEx;

  // PS/PC to confirm
  const toConfirmEx   = pspc.filter(p=>p.status==="Not Confirmed").reduce((s,p)=>s+p.allowance,0);
  const totalAllowEx  = pspc.reduce((s,p)=>s+p.allowance,0);

  const summary = {
    contract_ex:CONTRACT_EX,           contract_inc:CONTRACT_INC,
    paid_to_date_ex:paidToDateEx,      paid_to_date_inc:paidToDateInc,
    forecast_ex:forecastEx,            forecast_inc:forecastInc,
    approved_vars_ex:apprVarTotalEx,   approved_vars_non_pspc_ex:apprVarNonPspcEx,
    work_completed_ex:WORK_COMPLETED_EX,
    pspc_to_confirm_ex:toConfirmEx,    pspc_total_allowance_ex:totalAllowEx,
    pspc_pct_to_confirm:totalAllowEx>0?toConfirmEx/totalAllowEx:0,
  };

  const pendingVars=variations.filter(v=>v.status==="Pending").length;
  const unconfPSPC =pspc.filter(p=>p.status==="Not Confirmed").length;

  const subTabs=[
    ["summary",   "📊 Summary",    0,           ""],
    ["milestones","💳 Milestones", 0,           ""],
    ["pspc",      "📋 PS/PC",      unconfPSPC,  "#f59e0b"],
    ["variations","📝 Variations", pendingVars, "#f59e0b"],
  ];

  return(
    <div>
      <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:"1px solid #334155"}}>

          <button key={v} onClick={()=>setView(v)} style={{background:"none",border:"none",borderBottom:`2px solid ${view===v?"#3b82f6":"transparent"}`,padding:"10px 16px",color:view===v?"#f1f5f9":"#64748b",cursor:"pointer",fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:6}}>

}

const DOC_CATS = ["Milestone Invoice","Milestone Receipt","Variation","PS/PC Invoice","Payment Schedule"];
const DOC_LINK_TYPES = ["milestone","variation","pspc"];
const DOC_STATUS = ["Paid","Claimed","Approved","Issued","Pending","Disputed"];

const DOC_CAT_COLOR = {
  "Milestone Invoice": "#3b82f6",
  "Milestone Receipt": "#22c55e",
  "Variation":         "#7c3aed",
  "PS/PC Invoice":     "#f59e0b",
  "Payment Schedule":  "#64748b",
};

function DocBadge({cat}){
  const color = DOC_CAT_COLOR[cat]||"#64748b";
  return <span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{cat}</span>;
}

function ReceiptsTab(){
  const[docs,setDocs]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[catFilter,setCatFilter]=useState("All");
  const[search,setSearch]=useState("");
  const[modal,setModal]=useState(null);
  const blank={id:null,category:DOC_CATS[0],linked_type:"milestone",linked_to:"",supplier:"Dion Group Projects",date:todayStr(),reference:"",amount_inc:"",description:"",status:"Paid",notes:""};
  const[form,setForm]=useState(blank);

  useEffect(()=>{
    (async()=>{
      try{
        const d=await window.storage.get("reno_documents_v1").catch(()=>null);
        setDocs(d?JSON.parse(d.value):SEED_DOCUMENTS);
      }catch(e){ setDocs(SEED_DOCUMENTS); }
      setLoaded(true);
    })();
  },[]);

  useEffect(()=>{
    if(!loaded||!docs) return;
    const t=setTimeout(async()=>{
      try{ await window.storage.set("reno_documents_v1",JSON.stringify(docs)); }catch(e){}
    },800);
    return()=>clearTimeout(t);
  },[docs,loaded]);

  if(!loaded) return <div style={{color:"#64748b",padding:20,textAlign:"center"}}>Loading documents…</div>;

  const save=()=>{
    const item={...form,id:form.id||uid(),amount_inc:form.amount_inc?parseFloat(form.amount_inc):null};
    setDocs(prev=>form.id?prev.map(d=>d.id===form.id?item:d):[...prev,item]);
    setModal(null);
  };

  const q=search.toLowerCase();
  const filtered=docs
    .filter(d=>(catFilter==="All"||d.category===catFilter))
    .filter(d=>!q||[d.supplier,d.description,d.reference,String(d.linked_to||"")].some(v=>(v||"").toLowerCase().includes(q)))
    .sort((a,b)=>b.date.localeCompare(a.date));

  // Group by category for display
  const groups = DOC_CATS.map(cat=>({
    cat,
    items: filtered.filter(d=>d.category===cat),
    total: filtered.filter(d=>d.category===cat&&d.amount_inc).reduce((s,d)=>s+(d.amount_inc||0),0),
  })).filter(g=>g.items.length>0);

  const totalPaid = docs.filter(d=>d.status==="Paid"&&d.amount_inc&&(d.category==="Milestone Receipt"||d.category==="PS/PC Invoice")).reduce((s,d)=>s+(d.amount_inc||0),0);

  const LINK_LABELS = {
    milestone: {1:"1 — Deposit",2:"2 — Demolition",3:"3 — Slabs",4:"4 — Frame",5:"5 — Cladding",6:"6 — Rough In",7:"7 — Plasterboard",8:"8 — Tiling",9:"9 — Cabinetry",10:"10 — PC"},
  };

  return(
    <div>
      {/* Summary KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:20}}>
        {[
          ["Total Documents",String(docs.length),"#64748b","all documents on file"],
          ["Milestone Invoices",String(docs.filter(d=>d.category==="Milestone Invoice").length),"#3b82f6",`${docs.filter(d=>d.category==="Milestone Invoice"&&d.status==="Paid").length} paid`],
          ["Signed Variations",String(docs.filter(d=>d.category==="Variation").length),"#7c3aed","HCV agreements"],
          ["Payment Schedules",String(docs.filter(d=>d.category==="Payment Schedule").length),"#64748b","owner disputes/adjustments"],
        ].map(([label,value,color,sub])=>(
          <div key={label} style={{background:"#1e2535",borderRadius:10,padding:"13px 15px",borderTop:`3px solid ${color}`}}>
            <div style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>{label}</div>
            <div style={{fontSize:22,fontWeight:800,color}}>{value}</div>
            <div style={{fontSize:11,color:"#64748b",fontStyle:"italic"}}>{sub}</div>
          </div>
        ))}
      </div>

      {/* Filter + search bar */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>
          {["All",...DOC_CATS].map(cat=>(
            <button key={cat} onClick={()=>setCatFilter(cat)} style={{padding:"5px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:catFilter===cat?DOC_CAT_COLOR[cat]||"#3b82f6":"#1e2535",color:catFilter===cat?"#fff":"#64748b"}}>
              {cat==="All"?"All":`${cat} (${docs.filter(d=>d.category===cat).length})`}
            </button>
          ))}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,width:200}} placeholder="Search ref, supplier…"/>
        <button onClick={()=>{setForm(blank);setModal("add");}} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Add</button>
      </div>

      {/* Grouped document tables */}
      {groups.map(({cat,items,total})=>(
        <div key={cat} style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <DocBadge cat={cat}/>
            <span style={{fontSize:12,color:"#64748b"}}>{items.length} document{items.length!==1?"s":""}</span>
            {total>0&&<span style={{fontSize:12,color:"#94a3b8",marginLeft:"auto"}}>{fmtAUD(total)} total</span>}
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:"2px solid #334155"}}>
                {["Date","Reference","Supplier","Description","Linked To","Amount (inc)","Status","Notes",""].map(h=>(
                  <th key={h} style={{padding:"7px 9px",textAlign:"left",color:"#64748b",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.4,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{items.map((d,i)=>{
                const linkLabel = d.linked_type==="milestone"
                  ? (LINK_LABELS.milestone[d.linked_to]||`MS #${d.linked_to}`)
                  : d.linked_type==="variation"
                  ? String(d.linked_to)
                  : `PS/PC #${d.linked_to}`;
                const linkColor = d.linked_type==="milestone"?"#3b82f6":d.linked_type==="variation"?"#7c3aed":"#f59e0b";
                return(
                  <tr key={d.id} style={{borderBottom:"1px solid #1e2535"}} onMouseEnter={e=>e.currentTarget.style.background="#1e2535"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{padding:"8px 9px",color:"#94a3b8",whiteSpace:"nowrap"}}>{d.date}</td>
                    <td style={{padding:"8px 9px",color:"#7c3aed",fontFamily:"monospace",fontSize:11,whiteSpace:"nowrap"}}>{d.reference||"—"}</td>
                    <td style={{padding:"8px 9px",color:"#f1f5f9",fontWeight:600,whiteSpace:"nowrap"}}>{d.supplier}</td>
                    <td style={{padding:"8px 9px",color:"#94a3b8",maxWidth:260}}>
                      {d.description}
                    </td>
                    <td style={{padding:"8px 9px",whiteSpace:"nowrap"}}>
                      <span style={{background:linkColor+"22",color:linkColor,border:`1px solid ${linkColor}44`,borderRadius:4,padding:"1px 7px",fontSize:10,fontWeight:600}}>{linkLabel}</span>
                    </td>
                    <td style={{padding:"8px 9px",color:"#22c55e",fontWeight:600,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{d.amount_inc?fmtAUD(d.amount_inc):"—"}</td>
                    <td style={{padding:"8px 9px"}}><StatusPill label={d.status} colorMap={{...MS_STATUS_COLOR,...VAR_STATUS_COLOR,Issued:"#64748b",Disputed:"#ef4444"}}/></td>
                    <td style={{padding:"8px 9px",color:"#64748b",fontSize:11,fontStyle:"italic",maxWidth:180}}>{d.notes||"—"}</td>
                    <td style={{padding:"8px 9px"}}>
                      <div style={{display:"flex",gap:4}}>
                        <button onClick={()=>{setForm({...d,amount_inc:d.amount_inc||""});setModal("edit");}} style={{background:"#334155",border:"none",borderRadius:5,padding:"3px 8px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>Edit</button>
                        <button onClick={()=>setDocs(prev=>prev.filter(x=>x.id!==d.id))} style={{background:"#450a0a",border:"none",borderRadius:5,padding:"3px 8px",color:"#fca5a5",cursor:"pointer",fontSize:11}}>Del</button>
                      </div>
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      ))}

      {filtered.length===0&&<div style={{color:"#475569",padding:"32px",textAlign:"center",fontSize:14}}>No documents match the current filter.</div>}

      {/* Add / Edit modal */}
      {modal&&(
        <Modal title={modal==="add"?"Add Document":"Edit Document"} onClose={()=>setModal(null)} wide>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Category"><Sel value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={DOC_CATS}/></Field>
            <Field label="Status"><Sel value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={DOC_STATUS}/></Field>
            <Field label="Supplier / Issuer"><input value={form.supplier} onChange={e=>setForm(f=>({...f,supplier:e.target.value}))} style={inp} placeholder="e.g. Dion Group Projects"/></Field>
            <Field label="Date"><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inp}/></Field>
            <Field label="Reference / Invoice #"><input value={form.reference} onChange={e=>setForm(f=>({...f,reference:e.target.value}))} style={inp} placeholder="e.g. INV-0224"/></Field>
            <Field label="Amount (inc GST)"><input type="number" value={form.amount_inc} onChange={e=>setForm(f=>({...f,amount_inc:e.target.value}))} style={inp} placeholder="Leave blank if N/A"/></Field>
            <Field label="Linked To (type)"><Sel value={form.linked_type} onChange={v=>setForm(f=>({...f,linked_type:v}))} options={DOC_LINK_TYPES}/></Field>
            <Field label="Linked To (ID / ref)">
              <input value={String(form.linked_to||"")} onChange={e=>setForm(f=>({...f,linked_to:form.linked_type==="milestone"?parseInt(e.target.value)||"":e.target.value}))} style={inp} placeholder={form.linked_type==="milestone"?"1–10":form.linked_type==="variation"?"e.g. HCV #007":"e.g. 12"}/>
            </Field>
          </div>
          <Field label="Description"><input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} style={inp} placeholder="Brief description of document"/></Field>
          <Field label="Notes"><input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={inp} placeholder="Optional — any context or caveats"/></Field>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
            <button onClick={()=>setModal(null)} style={{background:"#334155",border:"none",borderRadius:8,padding:"9px 20px",color:"#94a3b8",cursor:"pointer",fontWeight:600}}>Cancel</button>
            <button onClick={save} style={{background:"#3b82f6",border:"none",borderRadius:8,padding:"9px 20px",color:"#fff",cursor:"pointer",fontWeight:700}}>Save</button>
          </div>
        </Modal>
      )}
    </div>
  );
}
